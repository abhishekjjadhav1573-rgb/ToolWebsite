packages:
  "qrcode": "QR code generation for the QR Code tool"
  "@types/qrcode": "TypeScript definitions for qrcode"
  "date-fns": "Date manipulation and formatting for the Age Calculator tool"

images:
  - path: "artifacts/smart-utility-hub/public/images/hero-bg.png"
    description: "Abstract gradient mesh background in clean minimal professional style, predominantly bright white and very light blue/slate, soft and elegant, high resolution"
    aspect_ratio: "16:9"
  - path: "artifacts/smart-utility-hub/public/images/logo.png"
    description: "Minimal geometric logo mark representing a utility hub or smart tools, professional deep blue color on a transparent background"
    aspect_ratio: "1:1"

notes:
  - No backend is required; all 12 calculators operate strictly client-side.
  - The frontend relies on wouter for SPA navigation to prevent full page reloads when switching tools.
